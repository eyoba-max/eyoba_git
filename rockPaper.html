<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" conten="width=device-width, scale=1.0">
        <title>Git Tutorial</title>
        <link rel="stylesheet" href="rockPaper.css">
    </head>
    <body>
        <p>rock paper scissor game</p>
        <button onclick="playGame('rock');">rock</button>
        <button onclick="playGame('paper');">paper</button>
        <button onclick="playGame('scissor');">scissor</button>

        <h2>CALCULATOR</h2>
        <div class="calculator">
            <input id="display" readonly>
            <div id="key">
                <button class="btn" onclick="appendToDisplay('+');" id="operator">+</button>
                <button class="btn" onclick="appendToDisplay('7');">7</button>
                <button class="btn" onclick="appendToDisplay('8');">8</button>
                <button class="btn" onclick="appendToDisplay('9');">9</button>
                <button class="btn" onclick="appendToDisplay('-');" id="operator">-</button>
                <button class="btn" onclick="appendToDisplay('4');">4</button>
                <button class="btn" onclick="appendToDisplay('5');">5</button>
                <button class="btn" onclick="appendToDisplay('6');">6</button>
                <button class="btn" onclick="appendToDisplay('*');" id="operator">*</button>
                <button class="btn" onclick="appendToDisplay('1');">1</button>
                <button class="btn" onclick="appendToDisplay('2');">2</button>
                <button class="btn" onclick="appendToDisplay('3');">3</button>
                <button class="btn" onclick="appendToDisplay('/');" id="operator">/</button>
                <button class="btn" onclick="appendToDisplay('0');">0</button>
                <button class="btn" onclick="appendToDisplay('.');">.</button>
                <button class="btn" onclick="calculate();" id="operator">=</button>
                <button class="btn" onclick="clearDisplay();" id="operator">C</button>
            </div>
        </div>
        <script src="rockPaper.js"></script>
    </body>
</html>
